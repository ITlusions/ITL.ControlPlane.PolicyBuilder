id: /providers/ITL.Authorization/policyDefinitions/deny-sp-password-credentials
name: deny-sp-password-credentials
type: ITL.Authorization/policyDefinitions
properties:
  displayName: Deny Service Principals with Password Credentials
  description: Prevents creation of service principals with password-based secrets.
    Use managed identities or federated credentials instead.
  policyType: Custom
  mode: All
  metadata:
    category: Identity
  parameters: null
  policyRule:
    if:
      allOf:
      - field: type
        equals: Microsoft.AAD/servicePrincipals
      - field: properties.passwordCredentials
        exists: true
      - count:
          field: properties.passwordCredentials
        greater: 0
    then:
      effect: Deny
      message: Service principals with password credentials are not allowed. Use managed
        identities (system-assigned or user-assigned) or workload identities with
        federated credentials (OIDC).
