id: /providers/ITL.Authorization/policyDefinitions/audit-legacy-sp-credentials
name: audit-legacy-sp-credentials
type: ITL.Authorization/policyDefinitions
properties:
  displayName: Audit Service Principals with Legacy Credentials
  description: Identifies existing service principals using passwords or certificates
    for migration planning to managed identities or workload identities.
  policyType: Custom
  mode: All
  metadata:
    category: Identity
  parameters: null
  policyRule:
    if:
      allOf:
      - field: type
        equals: Microsoft.AAD/servicePrincipals
      - anyOf:
        - allOf:
          - field: properties.passwordCredentials
            exists: true
          - count:
              field: properties.passwordCredentials
            greater: 0
        - allOf:
          - field: properties.certificateCredentials
            exists: true
          - count:
              field: properties.certificateCredentials
            greater: 0
      - not:
          allOf:
          - field: properties.federatedIdentityCredentials
            exists: true
          - count:
              field: properties.federatedIdentityCredentials
            greater: 0
    then:
      effect: Audit
      message: This service principal uses legacy password or certificate credentials.
        Migrate to managed identity or workload identity with federated credentials.
