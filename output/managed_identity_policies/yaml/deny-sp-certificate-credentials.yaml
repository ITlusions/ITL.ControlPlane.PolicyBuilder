id: /providers/ITL.Authorization/policyDefinitions/deny-sp-certificate-credentials
name: deny-sp-certificate-credentials
type: ITL.Authorization/policyDefinitions
properties:
  displayName: Deny Service Principals with Certificate Credentials
  description: Prevents creation of service principals with certificate-based authentication.
    Use managed identities or federated credentials for passwordless auth.
  policyType: Custom
  mode: All
  metadata:
    category: Identity
  parameters: null
  policyRule:
    if:
      allOf:
      - field: type
        equals: Microsoft.AAD/servicePrincipals
      - field: properties.certificateCredentials
        exists: true
      - count:
          field: properties.certificateCredentials
        greater: 0
      - not:
          allOf:
          - field: properties.federatedIdentityCredentials
            exists: true
          - count:
              field: properties.federatedIdentityCredentials
            greater: 0
    then:
      effect: Deny
      message: Service principals with certificate credentials are not allowed unless
        combined with federated credentials. Use managed identities (system-assigned
        or user-assigned) or workload identities with federated credentials (OIDC).
